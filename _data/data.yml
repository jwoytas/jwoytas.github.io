# Profile
profile: |
  .NET developer with 6+ years of experience building healthcare software used daily by doctors, nurses, and pharmacists. At Okaki, I've led and contributed to EMR applications, a document management API handling 25,000+ records, and booking platforms with 70,000+ appointments processed. I specialize in C#, .NET, WPF, Blazor, and Azure cloud services, with hands-on experience in FHIR-based health data integrations. I hold a B.Sc. in Computer Science from the University of Alberta and a Machine Learning certification from AMII.

