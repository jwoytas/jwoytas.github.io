name: Generate Resume PDF

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF
        run: |
          node -e "
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            // Emulate print media so @media print styles apply
            await page.emulateMediaType('print');

            // Navigate to the live site
            await page.goto('https://jwoytas.github.io', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            // Additional style overrides for clean PDF output
            await page.addStyleTag({
              content: \`
                * { line-height: 1.3 !important; }
                body { margin: 0; padding: 0; }
                .container {
                  margin: 0 !important;
                  padding: 0 !important;
                  border: none !important;
                  border-radius: 0 !important;
                  box-shadow: none !important;
                  max-width: none !important;
                  min-height: auto !important;
                  width: 100% !important;
                }
                .container-block {
                  width: 95% !important;
                  padding: 0 !important;
                }
                .icon-bar { display: none !important; }
                .fork { display: none !important; }
                .profile-pic { border: none !important; min-width: 80px !important; min-height: 80px !important; }
                .header .title { font-size: 2.2rem !important; }
                .experiance .title, .career-profile .title {
                  margin-top: 12px !important;
                  font-size: 15px !important;
                }
                .experiance .title:before, .experiance .title:after,
                .career-profile .title:before, .career-profile .title:after {
                  border-bottom: none !important;
                }
                .career-profile .details,
                .experience-item .details,
                .experience-item .company,
                .experience-item .technologies { font-size: 12px !important; }
                .experience-item { margin-bottom: 0.5rem !important; }
                .experience-item .role { font-size: 13px !important; }
                .experience-item .details ul { margin: 0.2em 0 !important; padding-left: 1.2em !important; }
                .sidebar .title { font-size: 13px !important; }
                .sidebar .education-item { margin-bottom: 10px !important; }
                .sidebar .degree, .sidebar .university, .sidebar .time,
                .sidebar .idiom, .sidebar .skill { font-size: 11px !important; }
                .sidebar .skill-group { margin-bottom: 10px !important; }
              \`
            });

            // Generate PDF
            await page.pdf({
              path: 'assets/Resume - Jared Woytas.pdf',
              format: 'Letter',
              printBackground: true,
              margin: {
                top: '0.25in',
                right: '0.25in',
                bottom: '0.25in',
                left: '0.25in'
              }
            });

            await browser.close();
            console.log('PDF generated successfully');
          })();
          "

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet 'assets/Resume - Jared Woytas.pdf' && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated PDF
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'assets/Resume - Jared Woytas.pdf'
          git commit -m "Auto-generate resume PDF from live site [skip ci]"
          git push
