name: Generate Resume PDF

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if last commit was a PDF update (break loop)
        id: check_loop
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if echo "$LAST_MSG" | grep -q "Auto-generate resume PDF"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping - last commit was PDF auto-generation, avoiding infinite loop"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Puppeteer
        if: steps.check_loop.outputs.skip != 'true'
        run: npm install puppeteer

      - name: Generate PDF
        if: steps.check_loop.outputs.skip != 'true'
        run: |
          node -e "
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            // Emulate print media so @media print styles apply
            await page.emulateMediaType('print');

            // Navigate to the live site
            await page.goto('https://jwoytas.github.io', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            // Force light mode by removing dark theme attribute
            await page.evaluate(() => {
              document.documentElement.removeAttribute('data-theme');
              document.body.removeAttribute('data-theme');
              const toggle = document.getElementById('switch');
              if (toggle) toggle.checked = false;
            });

            // Comprehensive style overrides for clean, professional single-page PDF
            await page.addStyleTag({
              content: \`
                :root, [data-theme='dark'] {
                  --bg-color: #ffffff !important;
                  --bg-color-cv: #ffffff !important;
                  --fg-color: #00629b !important;
                  --fg-color-dark: #023b5b !important;
                  --fg-color-body: #434649 !important;
                  --fg-color-title-sm: #557080 !important;
                }
                * {
                  line-height: 1.45 !important;
                  -webkit-print-color-adjust: exact !important;
                  print-color-adjust: exact !important;
                }
                body {
                  margin: 0 !important;
                  padding: 0 !important;
                  background-color: #ffffff !important;
                }
                .icon-bar, .fork { display: none !important; }
                .container {
                  margin: 0 !important;
                  padding: 0 !important;
                  border: none !important;
                  border-radius: 0 !important;
                  box-shadow: none !important;
                  max-width: none !important;
                  min-height: auto !important;
                  width: 100% !important;
                  margin-bottom: 0 !important;
                  background-color: #ffffff !important;
                }
                /* Header with bottom border separator */
                .header {
                  width: 95% !important;
                  margin-bottom: 0 !important;
                  padding-bottom: 10px !important;
                  border-bottom: 2px solid #00629b !important;
                }
                .profile-pic {
                  border: none !important;
                  min-width: 70px !important;
                  min-height: 70px !important;
                  max-width: 70px !important;
                  max-height: 70px !important;
                }
                .header .title {
                  font-size: 1.9rem !important;
                  margin-left: 1.2rem !important;
                }
                .contact .contact-item svg {
                  width: 12px !important;
                  height: 12px !important;
                }
                .contact .contact-item a {
                  font-size: 10px !important;
                  padding-top: 1px !important;
                  padding-left: 3px !important;
                }
                .container-block {
                  width: 95% !important;
                  padding: 0 !important;
                }
                /* Section headers with underline */
                .experiance .title, .career-profile .title {
                  font-size: 13px !important;
                  letter-spacing: 1px !important;
                  margin-top: 16px !important;
                  margin-bottom: 6px !important;
                  padding-bottom: 3px !important;
                  border-bottom: 1.5px solid #00629b !important;
                }
                .career-profile .title {
                  margin-top: 12px !important;
                }
                .experiance .title:before, .experiance .title:after,
                .career-profile .title:before, .career-profile .title:after {
                  border-bottom: none !important;
                  display: none !important;
                }
                .career-profile .details {
                  font-size: 10.5px !important;
                  margin-top: 4px !important;
                }
                .career-profile .details p { margin: 0 !important; }
                /* Experience items with left accent border */
                .experience-item {
                  margin-bottom: 14px !important;
                  padding-left: 8px !important;
                  border-left: 2px solid #c8dce8 !important;
                }
                .experience-item .role {
                  font-size: 11.5px !important;
                  margin-bottom: 1px !important;
                }
                .experience-item .company {
                  font-size: 10px !important;
                  margin-bottom: 2px !important;
                }
                .experience-item .company .time { font-size: 10px !important; }
                .experience-item .details {
                  font-size: 10px !important;
                }
                .experience-item .details p { margin: 0 0 2px 0 !important; }
                .experience-item .details ul {
                  margin: 2px 0 !important;
                  padding-left: 1.2em !important;
                }
                .experience-item .details ul li {
                  margin-bottom: 1px !important;
                  padding-bottom: 0 !important;
                }
                .experience-item .details .project { font-size: 10px !important; }
                .experience-item .technologies { font-size: 9px !important; }
                /* Sidebar */
                .sidebar {
                  margin-top: 14px !important;
                  padding-right: 12px !important;
                }
                .sidebar .title {
                  font-size: 11px !important;
                  letter-spacing: 0.5px !important;
                  margin-bottom: 5px !important;
                  margin-top: 0 !important;
                  padding-bottom: 2px !important;
                  border-bottom: 1px solid #00629b !important;
                }
                .sidebar .languages { margin-bottom: 18px !important; }
                .sidebar .education { margin-bottom: 18px !important; width: auto !important; }
                .sidebar .education-item { margin-bottom: 10px !important; }
                .sidebar .degree { font-size: 10px !important; }
                .sidebar .university, .sidebar .time { font-size: 9.5px !important; }
                .sidebar .idiom { font-size: 10px !important; }
                .sidebar .skill-group {
                  width: auto !important;
                  margin-bottom: 16px !important;
                }
                .sidebar .skill { font-size: 10px !important; line-height: 1.6 !important; }
                a { text-decoration: none !important; }
              \`
            });

            // Generate PDF
            await page.pdf({
              path: 'assets/Resume - Jared Woytas.pdf',
              format: 'Letter',
              printBackground: true,
              margin: {
                top: '0.25in',
                right: '0.4in',
                bottom: '0.25in',
                left: '0.4in'
              }
            });

            await browser.close();
            console.log('PDF generated successfully');
          })();
          "

      - name: Check for changes
        if: steps.check_loop.outputs.skip != 'true'
        id: changes
        run: |
          git diff --quiet 'assets/Resume - Jared Woytas.pdf' && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated PDF
        if: steps.check_loop.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'assets/Resume - Jared Woytas.pdf'
          git commit -m "Auto-generate resume PDF from live site [skip ci]"
          git push
